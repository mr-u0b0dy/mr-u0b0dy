name: WakaTime Stats
on:
  schedule:
    # Runs daily at 00:30 UTC (offset from metrics to avoid overlap)
    - cron: "30 0 * * *"
  workflow_dispatch:

jobs:
  update-readme:
    name: Update README with WakaTime Stats
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | base64 -d | gpg --import --no-tty --batch --yes
          gpg --list-secret-keys --keyid-format LONG
      
      - name: Configure Git for GPG signing
        run: |
          git config --global user.signingkey $(gpg --list-secret-keys --keyid-format LONG | grep sec | awk '{print $1}' | cut -d'/' -f2)
          git config --global commit.gpgsign true
      
      - uses: anmol098/waka-readme-stats@v5
        id: waka
        continue-on-error: true
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          SHOW_LINES_OF_CODE: "True"
          SHOW_PROFILE_VIEWS: "False"
          SHOW_SHORT_INFO: "True"
          SHOW_COMMIT: "False"
          SHOW_DAYS_OF_WEEK: "True"
          SHOW_LANGUAGE: "True"
          SHOW_OS: "True"
          SHOW_PROJECTS: "False"
          SHOW_EDITORS: "True"
          SHOW_TIMEZONE: "True"
          SHOW_LANGUAGE_PER_REPO: "True"
          SHOW_LOC_CHART: "False"
          LOCALE: "en"
          COMMIT_BY_ME: "True"
          COMMIT_USERNAME: "mr-u0b0dy"
          COMMIT_EMAIL: ${{ github.actor }}@users.noreply.github.com

      - name: Warn if WakaTime update failed
        if: steps.waka.outcome == 'failure'
        run: echo "::warning::WakaTime stats update failed, but workflow continues. Check WAKATIME_API_KEY/GH_TOKEN permissions and action logs."
