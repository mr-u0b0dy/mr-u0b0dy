# Visit https://github.com/lowlighter/metrics#-documentation for full reference
name: Metrics
on:
  # Schedule updates (daily at midnight UTC)
  schedule: [{cron: "0 0 * * *"}]
  # Lines below let you run workflow manually and on each commit
  workflow_dispatch:
  push: {branches: ["main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@65836723097537a54cd8eb90f61839426b4266b6 # v3.34 (stable)
        id: metrics
        continue-on-error: true
        with:
          filename: assets/metrics.svg
          config_animations: yes
          config_output: svg
          config_padding: 0, 8 + 11%
          token: ${{ secrets.METRICS_TOKEN }}

          # Options
          user: mr-u0b0dy
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Calcutta

          # Achievements
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_secrets: yes
          plugin_achievements_threshold: B
          plugin_achievements_ignored: octonaut
          plugin_achievements_limit: 0

          # Reactions (yutkat-style)
          plugin_reactions: yes
          plugin_reactions_limit: 200
          plugin_reactions_days: 14
          plugin_reactions_details: count, percentage
          plugin_reactions_ignored: bot

          # Languages
          plugin_languages: yes
          plugin_languages_ignored: html, css, tex, less, dockerfile, makefile, qmake, lex, cmake, shell, gnuplot
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_details: percentage
          plugin_languages_sections: most-used

          # Isometric commit calendar
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # Recently starred repositories
          plugin_stars: yes
          plugin_stars_limit: 3

          # Topics (yutkat-style)
          plugin_topics: yes
          plugin_topics_sort: stars
          plugin_topics_mode: mastered
          plugin_topics_limit: 0

          # WakaTime in Metrics (yutkat-style)
          plugin_wakatime: yes
          plugin_wakatime_token: ${{ secrets.WAKATIME_API_KEY }}
          plugin_wakatime_days: 7
          plugin_wakatime_sections: time, projects, projects-graphs
          plugin_wakatime_limit: 4
          plugin_wakatime_url: https://wakatime.com
          plugin_wakatime_user: .user.login

      - name: Warn if Metrics update failed
        if: steps.metrics.outcome == 'failure'
        run: echo "::warning::GitHub Metrics failed unexpectedly. Workflow continues to keep status stable; check action logs and METRICS_TOKEN scopes."
