# Visit https://github.com/lowlighter/metrics#-documentation for full reference
name: Metrics
on:
  # Schedule updates (daily at midnight UTC)
  schedule: [{cron: "0 0 * * *"}]
  # Lines below let you run workflow manually and on each commit
  workflow_dispatch:
  push: {branches: ["main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        id: metrics
        continue-on-error: true
        with:
          filename: assets/metrics.svg
          output_action: commit
          committer_branch: main
          committer_message: "chore(metrics): update GitHub metrics"
          config_animations: yes
          config_output: svg
          config_padding: 0, 8 + 11%
          token: ${{ secrets.METRICS_TOKEN }}

          # Options
          user: mr-u0b0dy
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Calcutta

          # Achievements
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_secrets: yes
          plugin_achievements_threshold: B
          plugin_achievements_ignored: octonaut
          plugin_achievements_limit: 0

          # Reactions (overall)
          plugin_reactions: yes
          plugin_reactions_limit: 0
          plugin_reactions_days: 0
          plugin_reactions_details: count, percentage
          plugin_reactions_ignored: bot

          # Languages
          plugin_languages: yes
          plugin_languages_ignored: html, css, tex, less, dockerfile, makefile, qmake, lex, cmake, shell, gnuplot
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_details: percentage
          plugin_languages_sections: most-used, recently-used

          # Isometric commit calendar
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # Remove recently bookmarked/starred repositories
          plugin_stars: no

          # Topics
          plugin_topics: yes
          plugin_topics_sort: stars
          plugin_topics_mode: mastered
          plugin_topics_limit: 12

